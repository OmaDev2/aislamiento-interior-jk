backend:
  name: git-gateway
  branch: main # ¡IMPORTANTE! Cámbialo a 'main' si tu rama principal se llama así

media_folder: public/images
public_folder: /images

locale: es

collections:
  # ── Páginas de ciudad ────────────────────────────────────────────────────────
  - name: locations
    label: Páginas de ciudad
    label_singular: Ciudad
    folder: src/content/locations
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Ciudad, name: city, widget: string }
      - {
          label: "Provincia / Estado",
          name: state,
          widget: string,
          required: false,
        }
      - { label: "H1 de la página", name: h1, widget: string }
      - { label: "Title (SEO)", name: title, widget: string }
      - { label: "Meta description", name: description, widget: text }
      - {
          label: "Imagen hero (URL)",
          name: heroImage,
          widget: string,
          required: false,
        }
      - label: "Barrios y zonas"
        name: neighborhoods
        widget: list
        required: false
        field: { widget: string }
      - label: "Puntos de referencia"
        name: landmarks
        widget: list
        required: false
        field: { widget: string }
      - {
          label: "Rango de precios",
          name: priceRange,
          widget: string,
          required: false,
        }
      - label: Keywords
        name: keywords
        widget: list
        required: false
        field: { widget: string }
      - label: "Preguntas frecuentes (FAQs)"
        name: faqs
        widget: list
        required: false
        fields:
          - { label: Pregunta, name: question, widget: string }
          - { label: Respuesta, name: answer, widget: text }
      - { label: Contenido de la página, name: body, widget: markdown }

  # ── Páginas de servicio ──────────────────────────────────────────────────────
  - name: services
    label: Páginas de servicio
    label_singular: Servicio
    folder: src/content/services
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "Nombre del servicio", name: name, widget: string }
      - { label: "Title (SEO)", name: title, widget: string }
      - { label: "Meta description", name: description, widget: text }
      - {
          label: "Imagen hero (URL)",
          name: heroImage,
          widget: string,
          required: false,
        }
      - {
          label: "Precio orientativo",
          name: price,
          widget: string,
          required: false,
        }
      - {
          label: "Duración estimada",
          name: duration,
          widget: string,
          required: false,
        }
      - label: Keywords
        name: keywords
        widget: list
        required: false
        field: { widget: string }
      - { label: Contenido de la página, name: body, widget: markdown }

  # ── Configuración del negocio + Home ─────────────────────────────────────────
  - name: settings
    label: "Configuración"
    files:
      # --- PORTADA (Home) ---
      - name: home
        label: "Portada (Home)"
        file: src/data/home.json
        format: json
        fields:
          - name: meta
            label: "Metadatos SEO"
            widget: object
            fields:
              - { label: "Título del sitio", name: siteTitle, widget: string }
              - {
                  label: "Meta descripción",
                  name: metaDescription,
                  widget: text,
                }

          - name: urgencyStrip
            label: "Barra de Urgencia Superior (Roja)"
            widget: object
            fields:
              - { label: "Etiqueta (Badge)", name: badge, widget: string }
              - label: "Textos de advertencia"
                name: items
                widget: list
                field: { widget: string }

          - name: hero
            label: "Sección Principal (Hero)"
            widget: object
            fields:
              - { label: "Título H1", name: h1, widget: string }
              - {
                  label: "H1 Destacado (Naranja)",
                  name: h1Highlight,
                  widget: string,
                }
              - { label: "Subtítulo", name: subtitle, widget: text }
              - {
                  label: "Subtítulo Extra",
                  name: subtitleExtra,
                  widget: string,
                }
              - { label: "Texto Trust Badge", name: trustBadge, widget: string }
              - label: "Puntos de dolor"
                name: painPoints
                widget: list
                field: { widget: string }
              - label: "Características de confianza"
                name: trustFeatures
                widget: list
                field: { widget: string }
              - {
                  label: "Texto Botón Principal",
                  name: ctaPrimary,
                  widget: string,
                }
              - name: form
                label: "Formulario Hero"
                widget: object
                fields:
                  - { label: "Título", name: heading, widget: string }
                  - { label: "Subtítulo", name: subtitle, widget: string }
                  - { label: "Texto Botón", name: submitText, widget: string }
                  - {
                      label: "Aviso inferior",
                      name: disclaimer,
                      widget: string,
                    }

          - name: problems
            label: "Sección Problemas"
            widget: object
            fields:
              - { label: "Título", name: heading, widget: string }
              - name: cards
                label: "Tarjetas"
                widget: list
                fields:
                  - { label: "Título", name: title, widget: string }
                  - { label: "Descripción", name: text, widget: text }

          - name: solution
            label: "Sección Solución"
            widget: object
            fields:
              - { label: "Título", name: heading, widget: string }
              - { label: "Introducción", name: intro, widget: text }
              - name: cards
                label: "Beneficios"
                widget: list
                fields:
                  - { label: "Título", name: title, widget: string }
                  - { label: "Descripción", name: description, widget: text }

          - name: faq
            label: "Sección FAQ"
            widget: object
            fields:
              - { label: "Título", name: heading, widget: string }
              - name: items
                label: "Preguntas"
                widget: list
                fields:
                  - { label: "Pregunta", name: question, widget: string }
                  - { label: "Respuesta", name: answer, widget: text }

      # --- DATOS DEL NEGOCIO ---
      - name: business
        label: "Datos del negocio"
        file: src/data/business.json
        format: json
        fields:
          - { label: "Nombre del negocio", name: name, widget: string }
          - { label: "Teléfono", name: phone, widget: string }
          - { label: "URL del sitio", name: url, widget: string }
          - label: "Ciudades de servicio"
            name: serviceArea
            widget: list
            field: { widget: string }
          - label: "Servicios"
            name: services
            widget: list
            field: { widget: string }
          - { label: "GTM ID", name: gtmId, widget: string, required: false }
