backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

locale: es

collections:
  # ── Páginas de ciudad ────────────────────────────────────────────────────────
  - name: locations
    label: Páginas de ciudad
    label_singular: Ciudad
    folder: src/content/locations
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Ciudad, name: city, widget: string }
      - {
          label: "Provincia / Estado",
          name: state,
          widget: string,
          required: false,
        }
      - { label: "H1 de la página", name: h1, widget: string }
      - { label: "Title (SEO)", name: title, widget: string }
      - { label: "Meta description", name: description, widget: text }
      - {
          label: "Imagen hero (URL)",
          name: heroImage,
          widget: string,
          required: false,
        }
      - label: "Barrios y zonas"
        name: neighborhoods
        widget: list
        required: false
        field: { name: neighborhood, label: Barrio, widget: string }
      - label: "Puntos de referencia"
        name: landmarks
        widget: list
        required: false
        field: { name: landmark, label: Referencia, widget: string }
      - {
          label: "Rango de precios",
          name: priceRange,
          widget: string,
          required: false,
        }
      - label: Keywords
        name: keywords
        widget: list
        required: false
        field: { name: keyword, label: Keyword, widget: string }
      - label: "Preguntas frecuentes (FAQs)"
        name: faqs
        widget: list
        required: false
        fields:
          - { label: Pregunta, name: question, widget: string }
          - { label: Respuesta, name: answer, widget: text }
      - { label: Contenido de la página, name: body, widget: markdown }

  # ── Páginas de servicio ──────────────────────────────────────────────────────
  - name: services
    label: Páginas de servicio
    label_singular: Servicio
    folder: src/content/services
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "Nombre del servicio", name: name, widget: string }
      - { label: "Title (SEO)", name: title, widget: string }
      - { label: "Meta description", name: description, widget: text }
      - {
          label: "Imagen hero (URL)",
          name: heroImage,
          widget: string,
          required: false,
        }
      - {
          label: "Precio orientativo",
          name: price,
          widget: string,
          required: false,
        }
      - {
          label: "Duración estimada",
          name: duration,
          widget: string,
          required: false,
        }
      - label: Keywords
        name: keywords
        widget: list
        required: false
        field: { name: keyword, label: Keyword, widget: string }
      - { label: Contenido de la página, name: body, widget: markdown }

  # ── Configuración del negocio + Home ─────────────────────────────────────────
  - name: settings
    label: "Configuración"
    files:
      # --- PORTADA (Home) ---
      - name: home
        label: "Portada (Home)"
        file: src/data/home.json
        format: json
        fields:
          - name: meta
            label: "Metadatos SEO"
            widget: object
            fields:
              - { label: "Título del sitio", name: siteTitle, widget: string }
              - {
                  label: "Meta descripción",
                  name: metaDescription,
                  widget: text,
                }

          - name: urgencyStrip
            label: "Barra de Urgencia Superior (Roja)"
            widget: object
            fields:
              - { label: "Etiqueta (Badge)", name: badge, widget: string }
              - label: "Textos de advertencia"
                name: items
                widget: list
                field: { name: item, label: Texto, widget: string }

          - name: hero
            label: "Sección Principal (Hero)"
            widget: object
            fields:
              - { label: "Título H1", name: h1, widget: string }
              - {
                  label: "H1 Destacado (Naranja)",
                  name: h1Highlight,
                  widget: string,
                }
              - { label: "Subtítulo", name: subtitle, widget: text }
              - {
                  label: "Subtítulo Extra",
                  name: subtitleExtra,
                  widget: string,
                }
              - { label: "Texto Trust Badge", name: trustBadge, widget: string }
              - label: "Puntos de dolor"
                name: painPoints
                widget: list
                field: { name: point, label: Punto, widget: string }
              - label: "Características de confianza"
                name: trustFeatures
                widget: list
                field: { name: feature, label: Característica, widget: string }
              - {
                  label: "Texto Botón Principal",
                  name: ctaPrimary,
                  widget: string,
                }
              - name: form
                label: "Formulario Hero"
                widget: object
                fields:
                  - { label: "Título", name: heading, widget: string }
                  - { label: "Subtítulo", name: subtitle, widget: string }
                  - name: fields
                    label: "Placeholders de los campos"
                    widget: object
                    fields:
                      - { label: "Nombre", name: nombre, widget: string }
                      - { label: "Teléfono", name: telefono, widget: string }
                      - {
                          label: "Código Postal",
                          name: codigoPostal,
                          widget: string,
                        }
                      - { label: "Problema", name: problema, widget: string }
                  - name: options
                    label: "Opciones del desplegable"
                    widget: list
                    fields:
                      - { label: "Valor interno", name: value, widget: string }
                      - { label: "Texto visible", name: label, widget: string }
                  - { label: "Texto Botón", name: submitText, widget: string }
                  - {
                      label: "Aviso inferior",
                      name: disclaimer,
                      widget: string,
                    }

          - name: problems
            label: "Sección Problemas"
            widget: object
            fields:
              - { label: "Etiqueta", name: badge, widget: string }
              - { label: "Título", name: heading, widget: string }
              - name: cards
                label: "Tarjetas"
                widget: list
                fields:
                  - { label: "Título", name: title, widget: string }
                  - { label: "Descripción", name: description, widget: text } # <-- Aquí estaba el fallo
              - { label: "Llamada a la acción", name: cta, widget: string }

          - name: solution
            label: "Sección Solución"
            widget: object
            fields:
              - { label: "Etiqueta", name: badge, widget: string }
              - { label: "Título", name: heading, widget: string }
              - { label: "Subtítulo", name: subtitle, widget: string }
              - { label: "Introducción", name: intro, widget: text }
              - name: cards
                label: "Beneficios"
                widget: list
                fields:
                  - { label: "Título", name: title, widget: string }
                  - { label: "Descripción", name: description, widget: text }
              - {
                  label: "Llamada a la acción secundaria",
                  name: secondaryCta,
                  widget: string,
                }

          - name: espesor
            label: "Sección Factor Espesor"
            widget: object
            fields:
              - { label: "Etiqueta", name: badge, widget: string }
              - { label: "Título", name: heading, widget: string }
              - {
                  label: "Título Destacado",
                  name: headingHighlight,
                  widget: string,
                }
              - { label: "Texto", name: text, widget: text }
              - {
                  label: "Etiqueta informativa",
                  name: infoBadge,
                  widget: string,
                }
              - { label: "Llamada a la acción", name: cta, widget: string }
              - {
                  label: "Título comparativa",
                  name: comparisonTitle,
                  widget: string,
                }
              - name: comparisons
                label: "Comparativas"
                widget: list
                fields:
                  - { label: "Nombre", name: name, widget: string }
                  - { label: "Espesor", name: thickness, widget: string }
                  - {
                      label: "Recomendado",
                      name: recommended,
                      widget: boolean,
                      required: false,
                    }
                  - {
                      label: "Porcentaje ancho",
                      name: widthPercent,
                      widget: number,
                      required: false,
                    }
                  - {
                      label: "No viable",
                      name: notViable,
                      widget: boolean,
                      required: false,
                    }
                  - {
                      label: "Razón no viable",
                      name: notViableReason,
                      widget: string,
                      required: false,
                    }
              - {
                  label: "Footer comparativa",
                  name: comparisonFooter,
                  widget: string,
                }

          - name: systemLayers
            label: "Sección Capas del Sistema"
            widget: object
            fields:
              - { label: "Etiqueta", name: badge, widget: string }
              - { label: "Título", name: heading, widget: string }
              - {
                  label: "Título Destacado",
                  name: headingHighlight,
                  widget: string,
                }
              - { label: "Aviso importante", name: warning, widget: text }
              - name: layers
                label: "Capas"
                widget: list
                fields:
                  - { label: "Título", name: title, widget: string }
                  - {
                      label: "Subtítulo",
                      name: subtitle,
                      widget: string,
                      required: false,
                    }
                  - {
                      label: "Items",
                      name: items,
                      widget: list,
                      field: { name: item, widget: string },
                    }
                  - {
                      label: "Destacado",
                      name: featured,
                      widget: boolean,
                      required: false,
                    }
                  - {
                      label: "Etiqueta extra",
                      name: badge,
                      widget: string,
                      required: false,
                    }
              - {
                  label: "Título especificaciones",
                  name: specsTitle,
                  widget: string,
                }
              - {
                  label: "Subtítulo especificaciones",
                  name: specsSubtitle,
                  widget: string,
                }
              - name: specs
                label: "Especificaciones"
                widget: list
                fields:
                  - { label: "Etiqueta", name: label, widget: string }
                  - { label: "Valor", name: value, widget: string }
                  - { label: "Icono", name: icon, widget: string }

          - name: whenNeeded
            label: "Sección Cuándo lo Necesitas"
            widget: object
            fields:
              - { label: "Título", name: heading, widget: string }
              - {
                  label: "Título Destacado",
                  name: headingHighlight,
                  widget: string,
                }
              - { label: "Subtítulo", name: subtitle, widget: string }
              - name: cards
                label: "Tarjetas"
                widget: list
                fields:
                  - { label: "Título", name: title, widget: string }
                  - {
                      label: "Items",
                      name: items,
                      widget: list,
                      field: { name: item, widget: string },
                    }
              - { label: "Llamada a la acción", name: cta, widget: string }

          - name: process
            label: "Sección Proceso"
            widget: object
            fields:
              - { label: "Etiqueta", name: badge, widget: string }
              - { label: "Título", name: heading, widget: string }
              - {
                  label: "Título Destacado",
                  name: headingHighlight,
                  widget: string,
                }
              - { label: "Subtítulo", name: subtitle, widget: string }
              - name: steps
                label: "Pasos"
                widget: list
                fields:
                  - { label: "Título", name: title, widget: string }
                  - { label: "Tiempo", name: time, widget: string }
                  - {
                      label: "Items",
                      name: items,
                      widget: list,
                      field: { name: item, widget: string },
                    }
              - name: trustSignal
                label: "Caja final confianza"
                widget: object
                fields:
                  - { label: "Título", name: heading, widget: string }
                  - { label: "Texto", name: text, widget: string }
                  - {
                      label: "Botón Primario",
                      name: ctaPrimary,
                      widget: string,
                    }
                  - {
                      label: "Botón Secundario",
                      name: ctaSecondary,
                      widget: string,
                    }

          - name: realCases
            label: "Sección Casos Reales"
            widget: object
            fields:
              - { label: "Etiqueta", name: badge, widget: string }
              - { label: "Título", name: heading, widget: string }
              - { label: "Título Extra", name: headingExtra, widget: string }
              - { label: "Subtítulo", name: subtitle, widget: string }
              - name: cases
                label: "Casos"
                widget: list
                fields:
                  - { label: "Etiqueta Zona", name: tag, widget: string }
                  - { label: "Título", name: title, widget: string }
                  - { label: "Tratado", name: treated, widget: string }
                  - { label: "Habitaciones", name: rooms, widget: string }
                  - { label: "Problema", name: problem, widget: string }
                  - { label: "Resultado", name: result, widget: string }
                  - { label: "Testimonio", name: testimony, widget: text }
                  - { label: "Autor", name: author, widget: string }
              - name: trustBadges
                label: "Insignias de Confianza"
                widget: list
                fields:
                  - { label: "Valor", name: value, widget: string }
                  - { label: "Etiqueta", name: label, widget: string }
                  - { label: "Icono", name: icon, widget: string }

          - name: faq
            label: "Sección FAQ"
            widget: object
            fields:
              - { label: "Etiqueta", name: badge, widget: string }
              - { label: "Título", name: heading, widget: string }
              - {
                  label: "Título Destacado",
                  name: headingHighlight,
                  widget: string,
                }
              - name: items
                label: "Preguntas"
                widget: list
                fields:
                  - { label: "Pregunta", name: question, widget: string }
                  - { label: "Respuesta", name: answer, widget: text }
              - { label: "Texto soporte", name: supportText, widget: string }
              - { label: "CTA WhatsApp", name: whatsappCta, widget: string }

          - name: cityGrid
            label: "Sección Áreas de Servicio"
            widget: object
            fields:
              - { label: "Etiqueta", name: badge, widget: string }
              - { label: "Título", name: heading, widget: string }
              - {
                  label: "Título Destacado",
                  name: headingHighlight,
                  widget: string,
                }
              - { label: "Subtítulo", name: subtitle, widget: string }
              - name: signals
                label: "Señales de confianza"
                widget: list
                field: { name: signal, widget: string }

          - name: contact
            label: "Sección Contacto Final"
            widget: object
            fields:
              - { label: "Etiqueta", name: badge, widget: string }
              - { label: "Título", name: heading, widget: string }
              - {
                  label: "Título Destacado",
                  name: headingHighlight,
                  widget: string,
                }
              - { label: "Subtítulo", name: subtitle, widget: string }
              - { label: "Etiqueta Teléfono", name: phoneLabel, widget: string }
              - {
                  label: "Etiqueta WhatsApp",
                  name: whatsappLabel,
                  widget: string,
                }
              - { label: "Dirección", name: address, widget: string }
              - name: form
                label: "Textos del Formulario"
                widget: object
                fields:
                  - {
                      label: "Etiqueta Nombre",
                      name: nombreLabel,
                      widget: string,
                    }
                  - {
                      label: "Etiqueta Tel",
                      name: telefonoLabel,
                      widget: string,
                    }
                  - {
                      label: "Etiqueta Mensaje",
                      name: mensajeLabel,
                      widget: string,
                    }
                  - {
                      label: "Placeholder Nombre",
                      name: nombrePlaceholder,
                      widget: string,
                    }
                  - {
                      label: "Placeholder Tel",
                      name: telefonoPlaceholder,
                      widget: string,
                    }
                  - {
                      label: "Placeholder Mensaje",
                      name: mensajePlaceholder,
                      widget: string,
                    }
                  - { label: "Botón Envío", name: submitText, widget: string }
                  - { label: "Aviso Legal", name: disclaimer, widget: string }

      # --- DATOS DEL NEGOCIO ---
      - name: business
        label: "Datos del negocio"
        file: src/data/business.json
        format: json
        fields:
          - { label: "Nombre del negocio", name: name, widget: string }
          - { label: "Teléfono", name: phone, widget: string }
          - { label: "URL del sitio", name: url, widget: string }
          - label: "Ciudades de servicio"
            name: serviceArea
            widget: list
            field: { name: city, label: Ciudad, widget: string }
          - label: "Servicios"
            name: services
            widget: list
            field: { name: service, label: Servicio, widget: string }
          - { label: "GTM ID", name: gtmId, widget: string, required: false }
